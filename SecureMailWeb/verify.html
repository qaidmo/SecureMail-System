<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureMail - تحقق من البريد الإلكتروني</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated Backgrounds -->
    <div class="cyber-grid"></div>
    <div class="bg-glow"></div>

    <div class="auth-container">
        <div class="auth-panel glass-panel">
            <div class="auth-header">
                <div class="logo">S</div>
                <h1>تفعيل الحساب / Verify Account</h1>
                <p>لقد أرسلنا رمزاً سرياً مكوناً من 6 أرقام إلى بريدك الإلكتروني.</p>
            </div>

            <div id="responseNotice" class="notice text-main" style="display: none; margin-bottom: 20px;"></div>

            <form class="form" id="verifyForm" autocomplete="off">
                <!-- حقل مخفي لتخزين الإيميل الذي تم تمريره من صفحة التسجيل -->
                <input type="hidden" id="verifyEmail">

                <div class="field">
                    <div class="label">رمز التحقق (OTP)</div>
                    <input type="text" id="otpCode" class="input" required minlength="6" maxlength="6"
                        placeholder=""
                        style="text-align: center; font-size: 24px; letter-spacing: 5px; font-weight: bold;">
                </div>

                <button type="submit" class="btn primary" id="submitBtn">تفعيل الحساب</button>

                <div class="small" style="text-align: center; margin-top: 15px;">
                    لم يصلك الرمز؟ <a href="login.html">العودة لتسجيل الدخول</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script src="auth.js"></script>
    <script>
        // قراءة الإيميل من الرابط (URL Parameters) وتخزينه في الحقل المخفي
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('verifyEmail').value = email;
        } else {
            // إذا لم يكن هناك إيميل في الرابط، أعده لصفحة التسجيل
            window.location.href = 'register.html';
        }
    </script>
</body>

</html>
